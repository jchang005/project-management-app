<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>Dashboard</h2>
      </aside>

      <!-- Main Area -->
      <div class="main">
        <!-- Header -->
        <header class="header">
          <h1>My Tasks</h1>
        </header>

        <!-- Content (THIS is the grid container for columns) -->
        <main class="content">
          <div class="column">
            <h3>To Do</h3>
            <div class="task-card">Task 1</div>
            <div class="task-card">Task 2</div>
            <div class="task-card">Task 3</div>
          </div>

          <div class="column">
            <h3>In Progress</h3>
            <div class="task-card">Task 1</div>
            <div class="task-card">Task 2</div>
            <div class="task-card">Task 3</div>
          </div>

          <div class="column">
            <h3>Completed</h3>
            <div class="task-card">Task 1</div>
            <div class="task-card">Task 2</div>
            <div class="task-card">Task 3</div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
